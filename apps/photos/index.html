<!doctype html>
<html lang="es" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="RoncalPhoto portfolio de fotografia profesional" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <title>RoncalPhoto</title>
    <script>
      (() => {
        const storedLayoutUi = window.localStorage.getItem("roncal-layout-ui");
        let theme = "light";

        if (storedLayoutUi) {
          try {
            const parsedValue = JSON.parse(storedLayoutUi);
            const persistedTheme = parsedValue?.state?.theme;

            if (persistedTheme === "dark" || persistedTheme === "light") {
              theme = persistedTheme;
            }
          } catch {}
        }

        document.documentElement.dataset.theme = theme;
      })();
    </script>
  </head>
  <body class="h-full overflow-hidden antialiased">
    <div id="root" class="h-full"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
  </html>
