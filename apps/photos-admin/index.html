<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <script>
      (() => {
        const storedTheme = localStorage.getItem("roncalphoto-admin-theme");
        const theme =
          storedTheme === "dark" || storedTheme === "light"
            ? storedTheme
            : matchMedia("(prefers-color-scheme: light)").matches
              ? "light"
              : "dark";

        document.documentElement.dataset.mcTheme = theme;
        document.documentElement.style.colorScheme = theme;
        document
          .querySelector('meta[name="theme-color"]')
          ?.setAttribute("content", theme === "light" ? "#f5f5f5" : "#000000");
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300..700&family=Space+Mono:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <title>RoncalPhoto Dashboard</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/app/main.tsx"></script>
  </body>
</html>
